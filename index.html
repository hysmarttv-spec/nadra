<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>عيد ميلاد سعيد - الحاجة نادرة النصارى</title>
    
    <meta property="og:title" content="🎉 عيد ميلاد سعيد الحاجة نادرة 🎉" />
    <meta property="og:description" content="اضغط هنا لمشاهدة التهنئة والمفاجأة الخاصة بمناسبة عيد ميلاد ست الكل ❤️" />
    <meta property="og:image" content="https://hysmarttv-spec.github.io/nadra/img/img001.jpg" />
<meta property="og:image:type" content="image/jpeg" />
<meta property="og:image:width" content="400" />
<meta property="og:image:height" content="400" />
    <meta property="og:type" content="website" />

    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* إعادة ضبط الصندوق لمنع أي تمدد مخفي */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary-color: #ff007f;
            --gold: #ffd700;
            --bg-gradient: linear-gradient(135deg, #2b003b, #4a004a, #1a0024);
        }

        /* الإغلاق التام لأي انزياح أفقي (السبب الرئيسي لخراب الشاشة عندك) */
        html, body {
            width: 100vw;
            max-width: 100%;
            overflow-x: hidden !important; 
            position: relative;
        }

        body {
            background: var(--bg-gradient);
            background-size: 200% 200%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Cairo', sans-serif;
            color: white;
            text-align: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* غلاف حماية إضافي لمنع العناصر الثلاثية الأبعاد من كسر الشاشة */
        .app-wrapper {
            width: 100%;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-top: 3vh;
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 0 15px;
        }

        h1 {
            font-family: 'Aref Ruqaa', serif;
            font-size: 3.5rem;
            color: var(--gold);
            text-shadow: 0 0 15px var(--gold);
            margin: 5px 0;
            line-height: 1.2;
        }

        h2 {
            font-size: 1.5rem;
            color: #fff;
            margin: 0;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .audio-btn {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 1.2rem;
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
            margin: 15px auto;
            display: block;
        }

        /* =========================================
           معرض الصور 3D (تم حل مشكلة الـ RTL هنا)
           ========================================= */
        .gallery-container {
            margin: 50px auto;
            perspective: 1000px; 
            width: 100%;
            height: 35vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            position: relative;
            /* مهم جداً: إجبار المعرض على اتجاه اليسار لليمين لمنع المتصفح من عكس الإحداثيات الـ 3D */
            direction: ltr; 
        }

        .carousel {
            width: 130px;
            height: 190px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateGallery 70s infinite linear;
            transform-origin: center center; /* ضمان الدوران حول المركز */
        }

        .carousel-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            border: 3px solid var(--gold);
            background: #000;
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 7px;
            pointer-events: none;
            display: block;
        }

        @keyframes rotateGallery {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        /* =========================================
           نظام Lightbox לעرض الصور بدون تشوه
           ========================================= */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            direction: rtl; /* إعادة الاتجاه للوضع الطبيعي في الصندوق */
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 10px;
            border: 3px solid #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .lightbox.active img {
            transform: scale(1);
        }

        .message-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 2px solid var(--gold);
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            margin: 40px auto 30px;
            font-size: 1.3rem;
            line-height: 1.6;
            direction: rtl;
        }

        .balloon {
            position: fixed;
            bottom: -100px;
            width: 35px;
            height: 45px;
            border-radius: 50%;
            animation: floatUp 12s infinite linear;
            opacity: 0.7;
            z-index: 1;
        }
        .balloon::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 12px;
            width: 10px;
            height: 10px;
            background: inherit;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }

        @keyframes floatUp {
            0% { transform: translate3d(0, 0, 0) rotate(0deg); }
            100% { transform: translate3d(0, -120vh, 0) rotate(15deg); }
        }

        /* مقاسات الموبايل */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            h2 { font-size: 1.1rem; }
            
            .gallery-container {
                height: 40vh;
                margin: 30px auto;
            }
            .carousel {
                width: 85px; /* مقاس ثابت للموبايل */
                height: 130px;
            }
            .message-box {
                margin-top: 20px;
                font-size: 1.1rem;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="lightbox" id="lightbox">
        <img id="lightbox-img" src="" alt="صورة مكبرة">
    </div>

    <audio id="birthdayAudio" loop>
        <source src="audio/song001.mp3" type="audio/mpeg">
    </audio>

    <div class="app-wrapper">
        <header>
            <h2>كل عام وأنتِ نور حياتنا</h2>
            <h1>الحاجة نادرة النصارى</h1>
            <button class="audio-btn" id="playBtn" onclick="toggleAudio()">🎶 تشغيل لموسيقى</button>
        </header>

        <div class="gallery-container">
            <div class="carousel" id="carousel">
                <!-- 25 صورة -->
                <div class="carousel-item"><img src="img/img001.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img002.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img003.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img004.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img005.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img006.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img007.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img008.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img009.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img010.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img011.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img012.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img013.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img014.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img015.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img016.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img017.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img018.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img019.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img020.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img021.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img022.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img023.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img024.jpg" alt=""></div>
                <div class="carousel-item"><img src="img/img025.jpg" alt=""></div>
            </div>
        </div>

        <div class="message-box">
            أطال الله في عمرك يا غالية، ورزقك الصحة والعافية والسعادة في الدارين. <br>
            أنتِ البركة ونور البيت، كل عام وأنتِ تاج على رؤوسنا يا ست الكل. ❤️🌹
        </div>
    </div>

    <script>
        // --- 1. بناء دائرة الصور (حسابات قاطعة لا تعتمد على تأخير السيرفر) ---
        function setupCarousel() {
            const items = document.querySelectorAll('.carousel-item');
            const itemCount = items.length; 
            const angle = 360 / itemCount; 
            
            // تحديد الحجم بناءً على نوع الجهاز مباشرة بدل انتظار قراءة الـ CSS
            const isMobile = window.innerWidth <= 768;
            const itemWidth = isMobile ? 85 : 130; 
            
            // معادلة رياضية ثابتة تحسب القطر بدقة تامة + إضافة مساحة 30 بكسل كأمان
            const radius = Math.round((itemWidth / 2) / Math.tan(Math.PI / itemCount)) + (isMobile ? 30 : 40); 

            items.forEach((item, index) => {
                // استخدام translateZ لدفع الصور للأمام في مساحة 3D
                item.style.transform = `rotateY(${index * angle}deg) translateZ(${radius}px)`;
            });
        }

        // --- 2. نظام الـ Lightbox ---
        const items = document.querySelectorAll('.carousel-item');
        const carousel = document.getElementById('carousel');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        items.forEach(item => {
            item.addEventListener('click', function(e) {
                e.stopPropagation(); 
                const imgSrc = this.querySelector('img').src;
                lightboxImg.src = imgSrc;
                lightbox.classList.add('active');
                carousel.style.animationPlayState = 'paused'; 
            });
        });

        lightbox.addEventListener('click', function() {
            lightbox.classList.remove('active');
            carousel.style.animationPlayState = 'running'; 
        });

        // --- 3. البالونات ---
        function createBalloons() {
            const isMobile = window.innerWidth <= 768;
            const balloonCount = isMobile ? 5 : 10; 
            const colors = ['#ff4b4b', '#4bafff', '#ffcc00', '#ff4be6', '#4bff88'];

            for(let i=0; i < balloonCount; i++) {
                let balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.style.background = colors[Math.floor(Math.random() * colors.length)];
                // تحديد النطاق لمنع خروج البالونات عن الشاشة
                balloon.style.left = Math.floor(Math.random() * 85) + 5 + 'vw'; 
                balloon.style.animationDuration = (Math.random() * 6 + 8) + 's';
                balloon.style.animationDelay = Math.random() * 5 + 's';
                document.querySelector('.app-wrapper').appendChild(balloon);
            }
        }

        // --- 4. تشغيل الصوت والقصاصات ---
        let isPlaying = false;
        const audio = document.getElementById('birthdayAudio');
        const playBtn = document.getElementById('playBtn');

        function toggleAudio() {
            if (isPlaying) {
                audio.pause();
                playBtn.innerHTML = "🎶 تشغيل الموسيقى 🎶";
            } else {
                audio.play().catch(e => console.log("المتصفح يمنع التشغيل التلقائي"));
                playBtn.innerHTML = "⏸ إيقاف الموسيقى";
                fireConfetti();
            }
            isPlaying = !isPlaying;
        }

        function fireConfetti() {
            const isMobile = window.innerWidth <= 768;
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }
                var particleCount = isMobile ? 15 : 40 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        // تشغيل الأساسيات بمجرد قراءة الـ DOM
        setupCarousel();
        createBalloons();
        
        window.addEventListener('load', function() {
            setTimeout(fireConfetti, 500);
        });

        // تحديث التصميم عند تدوير الموبايل
        window.addEventListener('resize', setupCarousel);
    </script>
</body>
    </html>
